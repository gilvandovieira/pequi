name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Correctness gates. The pure TypeScript suite runs without --allow-ffi, so the native
      # backend tests skip cleanly; native is exercised separately via `deno task test:native`.
      - name: Format
        run: deno fmt --check

      - name: Lint
        run: deno task lint

      - name: Type-check
        run: deno task check

      - name: Test
        run: deno task test

      # Distribution gate: the committed `dist/` bundle (published as @pequi/log/bundle) must be a
      # byte-identical, deterministic build of the current source. Fails if someone edited source
      # without running `deno task bundle`.
      - name: Bundle freshness
        run: deno task bundle:verify
