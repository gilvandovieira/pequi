name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          # Pinned for a deterministic toolchain — a floating v2.x can change fmt/lint output
          # (notably the HTML formatter) and fail CI on files that pass locally.
          deno-version: v2.8.3

      # Correctness gates. `deno task test` runs the pure TypeScript suite without --allow-ffi, so
      # native backend tests skip cleanly there; native is exercised for real in the step below.
      - name: Format
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type-check
        run: deno task check

      # Source tests + bundle equivalence/type-export + import smoke (native tests skip without FFI).
      - name: Test
        run: deno task test

      # Native tests where available: the ubuntu-x86_64 runner ships the committed prebuilt
      # `.so`, so the Rust sink loads via FFI and its lifecycle/equivalence tests run for real.
      - name: Native tests
        run: deno task test:native

      # Artifact shape gate (not a runtime test): confirms each present prebuilt artifact has the
      # expected name, folder, extension, and architecture metadata. Missing cross artifacts
      # (ARM64/Windows) are tolerated; see NATIVE.md "What verification means".
      - name: Native artifacts
        run: deno task native:verify:artifacts

      # Distribution gate: the committed `dist/` bundle (published as @pequi/log/bundle) must be a
      # byte-identical, deterministic build of the current source. Fails if someone edited source
      # without running `deno task bundle`.
      - name: Bundle freshness
        run: deno task bundle:verify

      # Benchmark smoke: run every bundle/source/native/pino variant at a tiny iteration count and
      # assert each ran and passed its correctness gate, so a crashed benchmark fails the build.
      - name: Benchmark smoke
        run: deno task bench:smoke
